<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Судоку</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="js/generator.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="screen">

  <!-- Header -->
  <div class="header">
    <div class="header-center">
      <div class="header-date" id="header-date"></div>
      <div class="header-timer" id="header-timer">0:00</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="lives" id="lives-display"></div>
    <span class="difficulty-label" id="difficulty-label"></span>
    <div class="hints-display" id="hints-display"></div>
  </div>

  <!-- Grid -->
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <!-- Numpad -->
  <div class="numpad" id="numpad"></div>


</div>

<!-- Result overlay -->
<div class="result-overlay" id="result-overlay">
  <div class="result-card">
    <div class="result-date" id="result-date"></div>
    <div class="result-time" id="result-time"></div>
    <div class="result-perfect" id="result-perfect"></div>
    <div class="result-difficulty" id="result-difficulty"></div>
    <div class="result-stats">
      <div class="stat-item"><span class="stat-label">Рекорд</span><span class="stat-value">4:12</span></div>
      <div class="stat-item"><span class="stat-label">Ходы</span><span class="stat-value">47</span></div>
      <div class="stat-item"><span class="stat-label">Лучший в мире</span><span class="stat-value">1:38</span></div>
      <div class="stat-item"><span class="stat-label">Среднее</span><span class="stat-value">6:05</span></div>
      <div class="stat-item"><span class="stat-label">Точность</span><span class="stat-value">94%</span></div>
      <div class="stat-item"><span class="stat-label">Среднее в мире</span><span class="stat-value">8:47</span></div>
    </div>
    <div class="result-percentile">Top 12%</div>
  </div>
</div>

<script src="js/game.js"></script>
</body>
</html>
