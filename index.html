<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Судоку</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg:               #f2f2f7;
  --accent:           #f0589e;
  --accent-light:     rgba(240, 88, 158, 0.07);
  --accent-medium:    rgba(240, 88, 158, 0.16);
  --glass:            rgba(255, 255, 255, 0.75);
  --glass-border:     rgba(255, 255, 255, 0.90);
  --cell-bg:          #ffffff;
  --cell-given-bg:    #ffffff;
  --cell-given-color: #505050;
  --cell-user-color:  #1a1a1a;
  --cell-error-bg:    #fff0f3;
  --cell-error-color: #e02020;
  --box-separator:    #8c8c8c;
  --cell-separator:   #dedede;
  --text-primary:     #1a1a1a;
  --text-muted:       #9a9a9a;
  --life-color:       #e05252;
  --hint-color:       #d97706;
}

[data-theme="dark"] {
  --bg:               #1c1c1e;
  --accent:           #f0589e;
  --accent-light:     rgba(240, 88, 158, 0.10);
  --accent-medium:    rgba(240, 88, 158, 0.22);
  --glass:            rgba(255, 255, 255, 0.07);
  --glass-border:     rgba(255, 255, 255, 0.11);
  --cell-bg:          #2c2c2e;
  --cell-given-bg:    #242426;
  --cell-given-color: #f0f0f0;
  --cell-user-color:  #f0f0f0;
  --cell-error-bg:    #3d1520;
  --cell-error-color: #ff6080;
  --box-separator:    rgba(255, 255, 255, 0.18);
  --cell-separator:   rgba(255, 255, 255, 0.07);
  --text-primary:     #f0f0f0;
  --text-muted:       #6e6e72;
  --life-color:       #e05252;
  --hint-color:       #fbbf24;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

html {
  height: -webkit-fill-available;
  height: 100%;
}

body {
  min-height: -webkit-fill-available;
  min-height: 100%;
  overflow: hidden;
}

body {
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 430px;
  margin: 0 auto;
  user-select: none;
  -webkit-user-select: none;
  transition: background-color 0.25s;
}

/* ─── LAYOUT ─── */
.screen {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 16px;
}

/* ─── HEADER ─── */
.header {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px 0 6px;
  flex-shrink: 0;
}

.btn-icon {
  width: 44px;
  height: 44px;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-primary);
  transition: background 0.15s;
}
.btn-icon:active { background: var(--accent-light); }

.header-center {
  text-align: center;
}

.header-date {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-muted);
  line-height: 1;
  margin-bottom: 3px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.header-timer {
  font-size: 20px;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}

/* ─── STATS ROW ─── */
.stats-row {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 4px 2px 8px;
  flex-shrink: 0;
}

.hints-display { justify-content: flex-end; }

.lives { display: flex; gap: 6px; align-items: center; }
.life-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--life-color);
  transition: background 0.2s;
}
.life-dot.lost { background: var(--cell-separator); }

.difficulty-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.hints-display { display: flex; gap: 6px; align-items: center; }
.hint-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--hint-color);
  transition: background 0.2s;
}
.hint-dot.used { background: var(--cell-separator); }

/* ─── GRID WRAP (glass panel) ─── */
.grid-wrap {
  flex-shrink: 0;
  width: min(calc(100vw - 32px), calc(var(--vh, 1vh) * 100 - 210px), 400px);
  margin: 0 auto;
  position: relative;
  padding: 0;
  border-radius: 20px;
  background:
    radial-gradient(ellipse at 28% 22%, rgba(255,255,255,0.28) 0%, transparent 55%),
    linear-gradient(140deg, rgba(228,222,213,0.85) 0%, rgba(210,203,193,0.95) 100%);
  box-shadow: 0 6px 24px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.06);
}

/* Glass border shimmer */
.grid-wrap::before {
  content: "";
  border-radius: 20px;
  pointer-events: none;
  background: linear-gradient(160deg, rgba(255,255,255,0.65) 0%, rgba(255,255,255,0) 45%, rgba(255,255,255,0.18) 100%);
  padding: 1px;
  position: absolute;
  inset: 0;
  -webkit-mask-image: linear-gradient(#fff 0 0), linear-gradient(#fff 0 0);
  mask-image: linear-gradient(#fff 0 0), linear-gradient(#fff 0 0);
  -webkit-mask-clip: content-box, border-box;
  mask-clip: content-box, border-box;
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

/* ─── GRID ─── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  aspect-ratio: 1;
  gap: 2px;
  padding: 2px;
  background: var(--box-separator);
  border-radius: 20px;
}

.box {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 0;
  background: var(--cell-bg);
}

.box .cell {
  border-right: 1px solid var(--cell-separator);
  border-bottom: 1px solid var(--cell-separator);
}
.box .cell:nth-child(3n)    { border-right: none; }
.box .cell:nth-child(7),
.box .cell:nth-child(8),
.box .cell:nth-child(9)     { border-bottom: none; }

/* Скругление угловых боксов (без overflow:hidden — не обрезает анимацию) */
.box:nth-child(1) { border-top-left-radius:     18px; }
.box:nth-child(3) { border-top-right-radius:    18px; }
.box:nth-child(7) { border-bottom-left-radius:  18px; }
.box:nth-child(9) { border-bottom-right-radius: 18px; }

/* Скругление угловых ячеек — чтобы их фон тоже был rounded */
.box:nth-child(1) .cell:nth-child(1) { border-top-left-radius:     16px; }
.box:nth-child(3) .cell:nth-child(3) { border-top-right-radius:    16px; }
.box:nth-child(7) .cell:nth-child(7) { border-bottom-left-radius:  16px; }
.box:nth-child(9) .cell:nth-child(9) { border-bottom-right-radius: 16px; }

.cell {
  background: var(--cell-bg);
}

.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(14px, 5.6vw, 26px);
  font-weight: 600;
  color: var(--cell-user-color);
  cursor: pointer;
  transition: background 0.18s ease, color 0.18s ease;
  position: relative;
  overflow: hidden;
}

.cell-inner {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.18s ease;
}

.cell.given {
  background: var(--cell-given-bg);
  color: var(--cell-given-color);
  cursor: default;
}

.cell.highlighted    { background: var(--accent-light); }
.cell.highlighted-num { background: var(--accent-medium); }

@keyframes cell-popin {
  0%   { opacity: 0; transform: scale(0.7);  }
  33%  { opacity: 1; transform: scale(1.3);  }
  66%  { transform: scale(0.8);  }
  100% { transform: scale(1);    }
}
.cell.popin,
.cell.ripple,
.cell.bounce { background: var(--cell-bg) !important; }

.cell.popin .cell-inner {
  animation: cell-popin .3s ease-out;
  background: var(--accent-medium);
}

@keyframes cell-bounce {
  0%   { transform: scale(1);   }
  30%  { transform: scale(1.3); }
  65%  { transform: scale(0.8); }
  100% { transform: scale(1);   }
}
.cell.bounce .cell-inner {
  animation: cell-bounce .5s ease-out;
  background: var(--accent-light);
}

@keyframes cell-ripple {
  0%   { transform: scale(1);    }
  30%  { transform: scale(1.3);  }
  65%  { transform: scale(0.8);  }
  100% { transform: scale(1);    }
}
.cell.ripple .cell-inner {
  animation: cell-ripple .5s ease-out;
  background: var(--accent-medium);
}

.cell.selected {
  background: var(--accent-light) !important;
  box-shadow: inset 0 0 0 2px var(--accent);
}

.cell.error {
  background: var(--cell-error-bg) !important;
  color: var(--cell-error-color) !important;
}

/* ─── SPACER ─── */
.spacer { flex: 1; }

/* ─── NUMPAD ─── */
.numpad {
  flex-shrink: 0;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  padding: 14px 0 4px;
}

.numpad-row {
  display: flex;
  gap: 7px;
  justify-content: center;
}

.num-btn {
  width: clamp(48px, 13.5vw, 62px);
  height: clamp(48px, 13.5vw, 62px);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  background: var(--glass);
  font-family: 'Inter', sans-serif;
  font-size: clamp(17px, 5vw, 26px);
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s, border-color 0.1s, color 0.1s, transform 0.08s;
  position: relative;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}

/* Glass border shimmer */
.num-btn::before {
  content: "";
  border-radius: 14px;
  pointer-events: none;
  background: linear-gradient(rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 55%);
  padding: 1px;
  position: absolute;
  inset: 0;
  -webkit-mask-image: linear-gradient(#fff 0 0), linear-gradient(#fff 0 0);
  mask-image: linear-gradient(#fff 0 0), linear-gradient(#fff 0 0);
  -webkit-mask-clip: content-box, border-box;
  mask-clip: content-box, border-box;
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

.num-btn:active { transform: scale(0.92); }

.num-btn.selected {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.num-btn.done {
  opacity: 0.25;
  cursor: default;
}

.num-btn.notes-active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ─── NOTES GRID (demo) ─── */
.notes-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  width: 100%;
  height: 100%;
  padding: 2px;
}

.note-digit {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  font-weight: 500;
  color: var(--accent);
  line-height: 1;
}

/* ─── CONTROLS ─── */
.controls {
  flex-shrink: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 8px 20px;
}

.ctrl-btn {
  width: 52px;
  height: 52px;
  border: 1px solid var(--glass-border);
  border-radius: 50%;
  background: var(--glass);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-primary);
  transition: background 0.1s, transform 0.08s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  position: relative;
}

.ctrl-btn::before {
  content: "";
  border-radius: 50%;
  pointer-events: none;
  background: linear-gradient(rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 55%);
  padding: 1px;
  position: absolute;
  inset: 0;
  -webkit-mask-image: linear-gradient(#fff 0 0), linear-gradient(#fff 0 0);
  mask-image: linear-gradient(#fff 0 0), linear-gradient(#fff 0 0);
  -webkit-mask-clip: content-box, border-box;
  mask-clip: content-box, border-box;
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

.ctrl-btn:active { transform: scale(0.91); }
</style>
</head>

<body>
<div class="screen">

  <!-- Header -->
  <div class="header">
    <div class="header-center">
      <div class="header-date" id="header-date"></div>
      <div class="header-timer" id="header-timer">0:00</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="lives" id="lives-display"></div>
    <span class="difficulty-label" id="difficulty-label"></span>
    <div class="hints-display" id="hints-display"></div>
  </div>

  <!-- Grid -->
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <!-- Numpad -->
  <div class="numpad" id="numpad"></div>


</div>

<script>
// ─── VIEWPORT HEIGHT FIX (mobile browsers) ───────────────────────────────────
function setVH() {
  document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
}
setVH();
window.addEventListener('resize', setVH);

// ─── HAPTIC ─────────────────────────────────────────────────────────────────
function haptic(type) {
  try {
    const hf = window.Telegram?.WebApp?.HapticFeedback;
    if (!hf) return;
    if      (type === 'error')   hf.notificationOccurred('error');
    else if (type === 'success') hf.notificationOccurred('success');
    else if (type === 'select')  hf.impactOccurred('light');
    else if (type === 'input')   hf.impactOccurred('light');
    else if (type === 'hint')    hf.impactOccurred('medium');
    else if (type === 'blocked') {
      hf.impactOccurred('light');
      setTimeout(() => hf.impactOccurred('light'), 80);
    }
  } catch(e) {}
}

// ─── PUZZLE ──────────────────────────────────────────────────────────────────
// Классический easy-пазл, 36 данных клеток
const PUZZLE = [
  5,3,0, 0,7,0, 0,0,0,
  6,0,0, 1,9,5, 0,0,0,
  0,9,8, 0,0,0, 0,6,0,

  8,0,0, 7,6,1, 0,0,3,
  4,2,6, 8,5,3, 7,0,1,
  7,0,0, 0,2,4, 0,0,6,

  0,6,0, 0,0,0, 2,8,0,
  0,0,0, 4,1,9, 0,0,5,
  0,0,0, 0,8,0, 0,7,9,
];

const SOLUTION = [
  5,3,4, 6,7,8, 9,1,2,
  6,7,2, 1,9,5, 3,4,8,
  1,9,8, 3,4,2, 5,6,7,

  8,5,9, 7,6,1, 4,2,3,
  4,2,6, 8,5,3, 7,9,1,
  7,1,3, 9,2,4, 8,5,6,

  9,6,1, 5,3,7, 2,8,4,
  2,8,7, 4,1,9, 6,3,5,
  3,4,5, 2,8,6, 1,7,9,
];

const DIFFICULTY = { name: 'Easy', lives: 5, hints: 4 };

// ─── STATE ───────────────────────────────────────────────────────────────────
let grid        = [...PUZZLE];
const given     = PUZZLE.map(v => v !== 0);
let selectedCell = -1;   // -1 = нет
let selectedNum  =  0;   //  0 = нет
let lives        = DIFFICULTY.lives;
let hints        = DIFFICULTY.hints;
let errorCell    = -1;
let errorTimer   = null;
const history    = [];   // [{idx, prev}] для undo
let notesMode        = false;
let lastSelectTime   = 0;   // защита от двойного срабатывания click
const notes        = Array.from({length: 81}, () => new Set());

// ─── TIMER ───────────────────────────────────────────────────────────────────
let seconds  = 0;
let timerOn  = false;
let timerRef = null;

function startTimer() {
  if (timerOn) return;
  timerOn = true;
  timerRef = setInterval(() => { seconds++; renderTimer(); }, 1000);
}

function renderTimer() {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  document.getElementById('header-timer').textContent =
    `${m}:${s.toString().padStart(2,'0')}`;
}

// ─── GRID HELPERS ─────────────────────────────────────────────────────────────
const row = i => Math.floor(i / 9);
const col = i => i % 9;
const box = i => Math.floor(row(i) / 3) * 3 + Math.floor(col(i) / 3);

function getHighlights() {
  const hl    = new Set(); // строка/столбец/квадрат выбранной клетки
  const hlNum = new Set(); // все клетки с выбранной цифрой

  if (selectedCell >= 0) {
    const r = row(selectedCell), c = col(selectedCell), b = box(selectedCell);
    for (let i = 0; i < 81; i++) {
      if (i !== selectedCell && (row(i) === r || col(i) === c || box(i) === b))
        hl.add(i);
    }
  }

  if (selectedNum > 0) {
    for (let i = 0; i < 81; i++) {
      if (grid[i] === selectedNum) hlNum.add(i);
    }
  }

  return { hl, hlNum };
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderGrid() {
  const { hl, hlNum } = getHighlights();
  document.querySelectorAll('.cell').forEach(el => {
    const idx = +el.dataset.idx;
    const val = grid[idx];

    el.className = 'cell';
    if (given[idx]) el.classList.add('given');

    if (idx === errorCell)    el.classList.add('error');
    else if (idx === selectedCell) el.classList.add('selected');
    else if (hlNum.has(idx))  el.classList.add('highlighted-num');
    else if (hl.has(idx))     el.classList.add('highlighted');

    if (val === 0 && notes[idx].size > 0) {
      const notesHtml = [1,2,3,4,5,6,7,8,9]
        .map(n => `<span class="note-digit">${notes[idx].has(n) ? n : ''}</span>`)
        .join('');
      el.innerHTML = `<div class="cell-inner"><div class="notes-grid">${notesHtml}</div></div>`;
    } else {
      el.innerHTML = `<div class="cell-inner">${val > 0 ? val : ''}</div>`;
    }
  });
}

function renderLives() {
  const el = document.getElementById('lives-display');
  el.innerHTML = '';
  for (let i = 0; i < DIFFICULTY.lives; i++) {
    const d = document.createElement('div');
    d.className = 'life-dot' + (i < lives ? '' : ' lost');
    el.appendChild(d);
  }
}

function renderHints() {
  const el = document.getElementById('hints-display');
  el.innerHTML = '';
  for (let i = 0; i < DIFFICULTY.hints; i++) {
    const d = document.createElement('div');
    d.className = 'hint-dot' + (i < hints ? '' : ' used');
    el.appendChild(d);
  }
}

function renderNumpad() {
  const np = document.getElementById('numpad');
  np.innerHTML = '';

  // Первая строка: 1–5
  const row1 = document.createElement('div');
  row1.className = 'numpad-row';
  [1,2,3,4,5].forEach(n => {
    const btn = document.createElement('button');
    const done = grid.filter(v => v === n).length === 9;
    btn.className = 'num-btn' + (selectedNum === n ? ' selected' : '') + (done ? ' done' : '');
    btn.textContent = n;
    btn.disabled = done;
    btn.addEventListener('click', () => onNumClick(n));
    row1.appendChild(btn);
  });
  np.appendChild(row1);

  // Вторая строка: 6–9 + карандаш
  const row2 = document.createElement('div');
  row2.className = 'numpad-row';
  [6,7,8,9].forEach(n => {
    const btn = document.createElement('button');
    const done = grid.filter(v => v === n).length === 9;
    btn.className = 'num-btn' + (selectedNum === n ? ' selected' : '') + (done ? ' done' : '');
    btn.textContent = n;
    btn.disabled = done;
    btn.addEventListener('click', () => onNumClick(n));
    row2.appendChild(btn);
  });

  const pencilBtn = document.createElement('button');
  pencilBtn.className = 'num-btn' + (notesMode ? ' notes-active' : '');
  pencilBtn.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>`;
  pencilBtn.addEventListener('click', () => {
    notesMode = !notesMode;
    haptic('select');
    if (!notesMode) {
      selectedCell = -1;
      selectedNum  = 0;
      renderGrid();
    }
    renderNumpad();
  });
  row2.appendChild(pencilBtn);
  np.appendChild(row2);
}

// ─── BUILD DOM ────────────────────────────────────────────────────────────────
function buildGrid() {
  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = '';
  for (let br = 0; br < 3; br++) {
    for (let bc = 0; bc < 3; bc++) {
      const box = document.createElement('div');
      box.className = 'box';
      for (let cr = 0; cr < 3; cr++) {
        for (let cc = 0; cc < 3; cc++) {
          const idx = (br * 3 + cr) * 9 + (bc * 3 + cc);
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.idx = idx;
          cell.addEventListener('click', () => onCellClick(idx));
          box.appendChild(cell);
        }
      }
      gridEl.appendChild(box);
    }
  }
}

// ─── INTERACTION ─────────────────────────────────────────────────────────────
function onCellClick(idx) {
  if (!timerOn) startTimer();

  // Любая заполненная клетка (данная или введённая) — не трогаем
  if (grid[idx] > 0) { haptic('blocked'); return; }

  // Повторный тап → снять выбор (игнорируем если только что выбрали)
  if (selectedCell === idx) {
    if (Date.now() - lastSelectTime < 500) return;
    selectedCell = -1;
    renderGrid();
    return;
  }

  selectedCell = idx;
  lastSelectTime = Date.now();
  haptic('select');

  // Если цифра уже выбрана — вводим (или ставим заметку)
  if (selectedNum > 0) {
    if (notesMode) {
      tryNote(idx, selectedNum);
    } else {
      tryInput(idx, selectedNum);
    }
    return;
  }

  // Если в клетке уже что-то есть — подсветим эту цифру в нампаде
  if (grid[idx] > 0) selectedNum = grid[idx];

  renderGrid();
  renderNumpad();
}

function onNumClick(num) {
  if (!timerOn && num > 0) startTimer();

  // Стереть
  if (num === 0) {
    if (selectedCell >= 0 && !given[selectedCell] && grid[selectedCell] > 0) {
      history.push({ idx: selectedCell, prev: grid[selectedCell] });
      grid[selectedCell] = 0;
      haptic('input');
    }
    selectedNum = 0;
    renderGrid();
    renderNumpad();
    return;
  }

  // Режим заметок
  if (notesMode) {
    selectedNum = num;
    haptic('select');
    if (selectedNum > 0 && selectedCell >= 0 && !given[selectedCell] && grid[selectedCell] === 0) {
      tryNote(selectedCell, selectedNum);
    }
    renderNumpad();
    return;
  }

  // Повторный тап на цифру → снять выбор
  if (selectedNum === num) {
    selectedNum = 0;
    renderGrid();
    renderNumpad();
    return;
  }

  selectedNum = num;
  haptic('select');

  // Если клетка уже выбрана и редактируема — вводим
  if (selectedCell >= 0 && !given[selectedCell]) {
    tryInput(selectedCell, num);
    return;
  }

  renderGrid();
  renderNumpad();
}

function tryNote(idx, num) {
  const r = row(idx), c = col(idx), b = box(idx);
  const conflicts = [];
  for (let i = 0; i < 81; i++) {
    if (i !== idx && grid[i] === num &&
        (row(i) === r || col(i) === c || box(i) === b)) {
      conflicts.push(i);
    }
  }
  if (conflicts.length > 0) {
    haptic('select');
    conflicts.forEach(i => {
      const el = document.querySelector(`.cell[data-idx="${i}"]`);
      if (!el) return;
      el.classList.add('bounce');
      el.addEventListener('animationend', () => el.classList.remove('bounce'), { once: true });
    });
  } else {
    if (notes[idx].has(num)) {
      notes[idx].delete(num);
    } else {
      notes[idx].add(num);
    }
    haptic('input');
    renderGrid();
  }
}

function tryInput(idx, num) {
  if (given[idx]) return;

  if (SOLUTION[idx] === num) {
    // Верно
    history.push({ idx, prev: grid[idx] });
    grid[idx]    = num;
    notes[idx].clear();
    const r = row(idx), c = col(idx), b = box(idx);
    for (let i = 0; i < 81; i++) {
      if (i !== idx && (row(i) === r || col(i) === c || box(i) === b))
        notes[i].delete(num);
    }
    selectedCell = -1;
    const numDone = grid.filter(v => v === num).length === 9;
    selectedNum  = numDone ? 0 : num;
    if (numDone) {
      const allCells = [];
      for (let i = 0; i < 81; i++) if (grid[i] === num) allCells.push(i);
      rippleGroup(allCells, idx);
    }
    haptic('input');
    renderGrid();
    renderNumpad();
    const cellEl = document.querySelector(`.cell[data-idx="${idx}"]`);
    if (cellEl) {
      cellEl.classList.add('popin');
      cellEl.addEventListener('animationend', () => cellEl.classList.remove('popin'), { once: true });
    }
    checkGroups(idx);
    checkWin();
  } else {
    // Неверно
    lives--;
    haptic('error');
    errorCell = idx;
    renderGrid();
    renderLives();
    if (errorTimer) clearTimeout(errorTimer);
    errorTimer = setTimeout(() => {
      errorCell = -1;
      renderGrid();
    }, 650);
    if (lives <= 0) setTimeout(gameOver, 750);
  }
}

function onUndo() {
  if (!history.length) return;
  const { idx, prev } = history.pop();
  grid[idx] = prev;
  haptic('select');
  renderGrid();
}

// ─── WIN / LOSE ───────────────────────────────────────────────────────────────
function rippleGroup(indices, fromIdx) {
  const fromR = row(fromIdx), fromC = col(fromIdx);
  haptic('select');
  setTimeout(() => haptic('hint'),   100);
  setTimeout(() => { try { window.Telegram?.WebApp?.HapticFeedback?.impactOccurred('heavy'); } catch(e){} }, 220);
  indices.forEach(i => {
    if (i === fromIdx) return;
    const dist = Math.abs(row(i) - fromR) + Math.abs(col(i) - fromC);
    const el = document.querySelector(`.cell[data-idx="${i}"]`);
    if (!el) return;
    setTimeout(() => {
      el.classList.add('ripple');
      setTimeout(() => el.classList.remove('ripple'), 600);
    }, dist * 60);
  });
}

function checkGroups(idx) {
  const r = row(idx), c = col(idx), b = box(idx);

  // строка
  const rowCells = Array.from({length: 9}, (_, i) => r * 9 + i);
  if (rowCells.every(i => grid[i] > 0)) rippleGroup(rowCells, idx);

  // квадрат
  const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
  const boxCells = [];
  for (let dr = 0; dr < 3; dr++)
    for (let dc = 0; dc < 3; dc++)
      boxCells.push((br + dr) * 9 + (bc + dc));
  if (boxCells.every(i => grid[i] > 0)) rippleGroup(boxCells, idx);
}

function checkWin() {
  if (grid.every((v, i) => v === SOLUTION[i])) {
    clearInterval(timerRef);
    haptic('success');
    // TODO: переход на экран результата
    setTimeout(() => alert(`Решено за ${document.getElementById('header-timer').textContent}!`), 400);
  }
}

function gameOver() {
  clearInterval(timerRef);
  // TODO: экран проигрыша
  alert('Жизни закончились!');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  // Дата
  const dateStr = new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
  document.getElementById('header-date').textContent = dateStr;
  document.getElementById('difficulty-label').textContent = DIFFICULTY.name;

  buildGrid();
  renderGrid();
  renderLives();
  renderHints();
  renderNumpad();

  document.getElementById('btn-undo').addEventListener('click', onUndo);
  document.getElementById('btn-hint').addEventListener('click', () => haptic('hint'));

  // Telegram тема
  if (window.Telegram?.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.ready();
    if (tg.colorScheme === 'dark') document.body.dataset.theme = 'dark';
  }
}

init();
</script>
